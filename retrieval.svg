  <text x="462" y="131" class="ct" text-anchor="middle">VastDB Query</text>
  <text x="462" y="144" class="cd" text-anchor="middle">Vector search</text>
  <rect x="440" y="154" width="44" height="16" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="462" y="165" class="bt" fill="#475569" text-anchor="middle">VastDB</text>

  <!-- Arrow → -->
  <text x="526" y="131" font-size="13" fill="#cbd5e1" text-anchor="middle">→</text>

