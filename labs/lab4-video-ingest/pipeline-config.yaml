# Sample pipeline configuration
# Before deploying, replace $USER with your username (`echo $USER`) and <kubernetes-cluster-vrn> with your cluster VRN.
name: $USER-video-ingest-pipeline
description: S3-triggered pipeline that segments uploaded .mp4 files into 5-second clips
kubernetes_cluster_vrn: <kubernetes-cluster-vrn>
namespace: default
manifest:
  config:
    environment_variables:
      - name: S3_ENDPOINT_URL
        value: "http://<your-s3-endpoint>"
      - name: S3_REGION
        value: "<your-region>"
      - name: OUTPUT_BUCKET
        value: "$USER-video-segments"
      - name: SEGMENT_DURATION
        value: "5"
      - name: VLM_ENDPOINT
        value: "<your-vlm-endpoint>"
      - name: VISION_MODEL
        value: "<your-vision-model>"
      - name: EMBEDDING_MODEL
        value: "<your-embedding-model>"
      - name: SUMMARY_MODEL
        value: ""
      - name: MAX_TOKENS
        value: "512"
      - name: VASTDB_ENDPOINT
        value: "<your-vastdb-endpoint>"
      - name: VASTDB_BUCKET
        value: "<your-vastdb-bucket>"
      - name: VASTDB_SCHEMA
        value: "video_embeddings"
      - name: VASTDB_TABLE
        value: "segments"
  triggers:
    - name: $USER-s3-segment-video-trigger
      vrn: vast:dataengine:triggers:$USER-s3-segment-video-trigger
  function_deployments:
    - name: $USER-s3-segment-video
      function_vrn: vast:dataengine:functions:$USER-s3-segment-video
      revision: 1
  links:
    - source: ["$USER-s3-segment-video-trigger"]
      destination: ["$USER-s3-segment-video"]
