# Sample pipeline configuration
# Before deploying, replace rbansal2 with your username (`echo rbansal2`) and <kubernetes-cluster-vrn> with your cluster VRN.
name: rbansal2-s3-llm-summary-pipeline
description: A sample pipeline to summarize a file on an S3 element created event
kubernetes_cluster_vrn: <kubernetes-cluster-vrn>
namespace: default
manifest:
  config:
    environment_variables:
      - name: S3_ENDPOINT_URL
        value: "http://<your-s3-endpoint>"
      - name: S3_REGION
        value: "<your-region>"
      - name: LLM_ENDPOINT
        value: "<your-llm-endpoint>"
      - name: MODEL_NAME
        value: "<your-model-name>"
      - name: MAX_TOKENS
        value: "512"
  triggers:
    - name: rbansal2-s3-llm-summary-trigger
      vrn: vast:dataengine:triggers:rbansal2-s3-llm-summary-trigger
  function_deployments:
    - name: rbansal2-s3-llm-summary
      function_vrn: vast:dataengine:functions:rbansal2-s3-llm-summary
      revision: 1
  links:
    - source: ["rbansal2-s3-llm-summary-trigger"]
      destination: ["rbansal2-s3-llm-summary"]
